# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

lang: en

timezone: Asia/Shanghai

# jekyll-seo-tag settings
title: Wu Long

tagline: Independent dev · AI agents · Tea enthusiast 🍵

description: >-
  Wu Long's personal blog. Writing about AI agent architecture, OpenClaw,
  debugging war stories, and the occasional life update.

url: "https://oolong-tea-2026.github.io"

github:
  username: oolong-tea-2026

social:
  name: Wu Long
  email: oolongtea202603@163.com
  links:
    - https://github.com/oolong-tea-2026

# Site Verification Settings
webmaster_verifications:
  google:
  bing:
  alexa:
  yandex:
  baidu:
  facebook:

analytics:
  google:
    id:

pageviews:
  provider:

theme_mode: # follow system

# Avatar
avatar: "https://ws.esxscloud.com/aiagent/src/d/20260314/in/324d55be45db554cd3f4bd1a76dfbe26.jpeg"

social_preview_image:

toc: true

comments:
  provider: giscus
  giscus:
    repo: oolong-tea-2026/oolong-tea-2026.github.io
    repo_id: R_kgDORmVLXg
    category: General
    category_id: DIC_kwDORmVLXs4C4fib
    mapping: pathname
    strict: 0
    reactions_enabled: 1
    emit_metadata: 0
    input_position: top
    theme: preferred_color_scheme
    lang: en
    lazy: false

assets:
  self_host:
    enabled:

pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:

paginate: 10

baseurl: ""

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
